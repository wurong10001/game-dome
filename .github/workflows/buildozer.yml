name: Build & Release Kivy APK

# 触发条件
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安装系统依赖和 Buildozer
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libltdl-dev
          pip install buildozer cython

      # 4. 执行打包 (修复缩进与路径问题)
      - name: Build APK with Buildozer
        run: |
          # 清理旧构建缓存
          buildozer android clean
          # 使用 python -m 强制调用当前环境的 python 解释器
          python -m buildozer -v android debug
        env:
          TMPDIR: /tmp
          # 防止 p4a 读取旧的缓存路径
          P4A_SOURCE_DIR: ""

      # 5. 自动创建 GitHub Release 并上传 APK
      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
